version: '3.8'

services:
  web:
    build:
      context: .
      target: development
    ports:
      - "4173:4173"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_MIDTRANS_CLIENT_KEY=${VITE_MIDTRANS_CLIENT_KEY}
      - VITE_RAJAONGKIR_API_KEY=${VITE_RAJAONGKIR_API_KEY}
